<!DOCTYPE html>
<html>
<head>
    <title>Library Catalogue</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='catalog.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<!-- ================= HERO ================= -->
<section class="hero">
    <h1>LIBRARY CATALOGUE</h1>
    <p>Instant search • Add books • Checkout system</p>

    <!-- ❌ NO FORM (important fix) -->
    <input id="searchBox" type="text" placeholder="Search books, authors, ISBN...">
</section>


<!-- ================= CHECKOUT ================= -->
<section class="checkout-box">
    <h2>CHECKOUT</h2>

    <div id="checkoutList">
        <p class="placeholder">No books added yet</p>
    </div>

    <button class="checkout-btn" onclick="checkoutBooks()">
        Checkout Books
    </button>
</section>


<!-- ================= SEARCH RESULTS ================= -->
<section class="search-results">
    <h2>Results</h2>
    <a href="/" class="back-home">← Back to Home</a>

    <div id="results" class="book-grid"></div>
</section>


<!-- ================= JAVASCRIPT ================= -->
<script>

let checkout = [];
let currentResults = [];

/* ---------------- INSTANT SEARCH ---------------- */
document.getElementById("searchBox").addEventListener("input", async function(e){

    let query = e.target.value.trim();

    if(query.length < 2){
        document.getElementById("results").innerHTML = "";
        return;
    }

    let res = await fetch(`/search?q=${query}`);
    currentResults = await res.json();

    renderResults();
});


/* ---------------- RENDER SEARCH RESULTS ---------------- */
function renderResults(){

    let box = document.getElementById("results");
    box.innerHTML = "";

    currentResults.forEach((book, index) => {

        let isAdded = checkout.some(b => b.title === book.title);

        let div = document.createElement("div");
        div.className = "book-card";

        div.innerHTML = `
            <img src="${book.cover}" onerror="this.src='https://via.placeholder.com/180x260?text=No+Cover'">

            <div class="book-info">
                <h3>${book.title}</h3>
                <p>${book.author}</p>
                <p>${book.year}</p>

                <button onclick="toggleBook(${index})">
                    ${isAdded ? "Remove" : "+ Add"}
                </button>
            </div>
        `;

        box.appendChild(div);
    });
}


/* ---------------- ADD / REMOVE BOOK ---------------- */
function toggleBook(index){

    let book = currentResults[index];

    let existingIndex = checkout.findIndex(b => b.title === book.title);

    if(existingIndex === -1){
        checkout.push(book);
    } else {
        checkout.splice(existingIndex, 1);
    }

    renderCheckout();
    renderResults();
}


/* ---------------- CHECKOUT PANEL ---------------- */
function renderCheckout(){

    let box = document.getElementById("checkoutList");
    box.innerHTML = "";

    if(checkout.length === 0){
        box.innerHTML = `<p class="placeholder">No books added yet</p>`;
        return;
    }

    checkout.forEach(book => {
        let div = document.createElement("div");
        div.className = "checkout-item";
        div.innerText = book.title;
        box.appendChild(div);
    });
}


/* ---------------- FINAL CHECKOUT ---------------- */
function checkoutBooks(){

    if(checkout.length === 0){
        alert("No books added yet");
        return;
    }

    alert("Your books have been checked out");

    checkout = [];
    renderCheckout();
    renderResults();
}

</script>

</body>
</html>
